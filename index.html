<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Image Resizer Toolbox</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app-shell">
    <header class="hero">
      <div>
        <p class="eyebrow">Image Toolbox</p>
        <h1>Image Resizer</h1>
        <p>Resize images quickly in your browser. Upload a photo, choose the output size, and download your resized image instantly.</p>
      </div>
      <div class="hero-actions">
        <button id="uploadButton" class="button button-primary">Upload an Image</button>
        <input id="imageInput" type="file" accept="image/*" hidden />
      </div>
    </header>

    <main>
      <section class="panel input-panel">
        <div class="drop-zone" id="dropZone">
          <span>Drag & drop an image here, or click the button above.</span>
        </div>

        <div class="controls">
          <div class="control-group">
            <label for="widthInput">Width</label>
            <input id="widthInput" type="number" min="1" placeholder="width" />
          </div>

          <div class="control-group">
            <label for="heightInput">Height</label>
            <input id="heightInput" type="number" min="1" placeholder="height" />
          </div>

          <div class="control-group switch-group">
            <label for="aspectRatioToggle">Maintain aspect ratio</label>
            <input id="aspectRatioToggle" type="checkbox" checked />
          </div>

          <div class="control-group">
            <label for="formatSelect">Output format</label>
            <select id="formatSelect">
              <option value="image/png">PNG</option>
              <option value="image/jpeg">JPG</option>
              <option value="image/webp">WebP</option>
            </select>
          </div>

          <div class="control-group">
            <label for="qualityInput">JPEG/WebP quality</label>
            <input id="qualityInput" type="range" min="0.1" max="1" step="0.05" value="0.92" />
            <span id="qualityValue">92%</span>
          </div>
        </div>

        <div class="action-row">
          <button id="resizeButton" class="button">Resize Image</button>
          <button id="downloadButton" class="button button-secondary" disabled>Download</button>
        </div>
      </section>

      <section class="panel preview-panel">
        <h2>Preview</h2>
        <div class="preview-frame">
          <canvas id="previewCanvas" width="0" height="0"></canvas>
          <div id="emptyState" class="empty-state">No image loaded yet.</div>
        </div>
        <div class="meta-row" id="imageMeta"></div>
      </section>
    </main>
  </div>

  <script src="script.js"></script>
</body>
</html>
